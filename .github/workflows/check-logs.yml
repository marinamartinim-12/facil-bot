name: Check Railway Logs

on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Get Railway deployments and logs
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "=== Buscando deployments recentes ==="
          DEPS=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ deployments(first: 3, input: { serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\" }) { edges { node { id status createdAt } } } }"}')
          echo "$DEPS"

          DEPLOY_ID=$(echo "$DEPS" | python3 -c "import sys,json; data=json.load(sys.stdin); edges=data['data']['deployments']['edges']; print(edges[0]['node']['id']) if edges else print('none')" 2>/dev/null)
          echo "=== Deploy mais recente: $DEPLOY_ID ==="

          if [ "$DEPLOY_ID" != "none" ] && [ -n "$DEPLOY_ID" ]; then
            echo "=== Logs do deploy ==="
            curl -s -X POST https://backboard.railway.com/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"{ deploymentLogs(deploymentId: \\\"$DEPLOY_ID\\\") { message severity timestamp } }\"}" | python3 -c "
import sys, json
data = json.load(sys.stdin)
logs = data.get('data', {}).get('deploymentLogs', [])
for log in logs[-50:]:
    print(f\"[{log.get('severity','INFO')}] {log.get('message','')}\")"
          fi
