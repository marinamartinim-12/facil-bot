name: Conectar PostgreSQL

on:
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - name: Remover DATABASE_URL do SQLite e usar PostgreSQL
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "=== Removendo DATABASE_URL customizada (SQLite) ==="
          DEL=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { variableDelete(input: { projectId: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\", serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\", name: \"DATABASE_URL\" }) }"}')
          echo "Delete: $DEL"

          echo "=== Buscando variaveis do projeto (para ver DATABASE_URL do Postgres) ==="
          VARS=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ variables(projectId: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\", serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\") }"}')
          echo "Variaveis: $VARS"

          echo "=== Disparando redeploy ==="
          curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\") }"}'

          echo "✅ Pronto!"
