name: Setup PostgreSQL no Railway

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Criar banco PostgreSQL no Railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "=== Criando PostgreSQL no Railway ==="
          RESULT=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { pluginCreate(input: { projectId: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\", name: \"postgresql\" }) { id name } }"
            }')
          echo "Resultado: $RESULT"

          PLUGIN_ID=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('pluginCreate',{}).get('id','none'))" 2>/dev/null)
          echo "Plugin ID: $PLUGIN_ID"

          if [ "$PLUGIN_ID" != "none" ] && [ -n "$PLUGIN_ID" ]; then
            echo "✅ PostgreSQL criado com sucesso! ID: $PLUGIN_ID"
          else
            echo "⚠️ Resposta inesperada — verifique acima"
          fi
