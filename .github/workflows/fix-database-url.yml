name: Fix DATABASE_URL para Volume Persistente

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Definir DATABASE_URL para PostgreSQL
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "=== Buscando credenciais do PostgreSQL ==="
          PG_VARS=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ variables(projectId: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\", serviceId: \"72bdbae9-c7cd-41f9-9b92-1d050976ed55\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\") }"}')

          DB_URL="sqlite:////data/facil_leads.db"
          echo "Host: $(echo $DB_URL | sed 's|//.*@|//***@|')"

          echo "=== Definindo DATABASE_URL no brave-ambition ==="
          JSON_BODY=$(python3 -c "import json,sys; url=sys.argv[1]; body={'query':'mutation { variableUpsert(input: { projectId: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\", serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\", name: \"DATABASE_URL\", value: \"'+url+'\" }) }'}; print(json.dumps(body))" "$DB_URL")
          RESULT=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$JSON_BODY")
          echo "Resultado: $RESULT"

          echo "=== Disparando redeploy ==="
          curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\") }"}'

          echo "Pronto! PostgreSQL conectado!"
