name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/marinamartinim-12/facil-bot:latest
            ghcr.io/marinamartinim-12/facil-bot:${{ github.sha }}

      - name: Update Railway image source
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          SHA_TAG: ghcr.io/marinamartinim-12/facil-bot:${{ github.sha }}
        run: |
          echo "=== Atualizando imagem no Railway ==="
          RESULT=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceUpdate(serviceId: \\\"c1e1aad1-1155-48a7-b100-81e97c184334\\\", environmentId: \\\"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\\\", input: { source: { image: \\\"$SHA_TAG\\\" } }) }\"}")
          echo "Update result: $RESULT"

      - name: Trigger Railway deploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "=== Disparando novo deploy ==="
          DEPLOY=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\") }"}')
          echo "Deploy result: $DEPLOY"

          # Verificar se teve erro
          if echo "$DEPLOY" | grep -q '"errors"'; then
            echo "AVISO: Pode ter havido erro no deploy, verifique o Railway"
          else
            echo "Deploy disparado com sucesso!"
          fi
