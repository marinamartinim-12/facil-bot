name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/marinamartinim-12/facil-bot:latest

      - name: Install Railway CLI and redeploy
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: e129b873-ae12-48d1-9c6c-0822fb04cfe0
          RAILWAY_SERVICE_ID: c1e1aad1-1155-48a7-b100-81e97c184334
          RAILWAY_ENVIRONMENT_ID: 3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c
        run: |
          npm install -g @railway/cli
          echo "=== Updating image source ==="
          curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceUpdate(serviceId: \\\"c1e1aad1-1155-48a7-b100-81e97c184334\\\", environmentId: \\\"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\\\", input: { source: { image: \\\"ghcr.io/marinamartinim-12/facil-bot:latest\\\" } }) }\"}"
          echo ""
          echo "=== Redeploying ==="
          railway redeploy --service "brave-ambition" --yes
          echo "=== Done ==="
