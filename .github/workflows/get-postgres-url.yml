name: Buscar URL do PostgreSQL

on:
  workflow_dispatch:

jobs:
  get:
    runs-on: ubuntu-latest
    steps:
      - name: Listar serviços do projeto
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "=== Buscando serviços do projeto ==="
          curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ project(id: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\") { services { edges { node { id name } } } } }"}'

          echo ""
          echo "=== Buscando variaveis de todos os servicos ==="
          curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ project(id: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\") { services { edges { node { id name serviceInstances { edges { node { environmentId } } } } } } } }"}'
