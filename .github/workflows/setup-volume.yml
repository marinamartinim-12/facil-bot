name: Setup Volume Persistente no Railway

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Criar volume persistente
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "=== Criando e montando volume ==="
          VOL=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { volumeCreate(input: { projectId: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\", serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\", mountPath: \"/data\" }) { id } }"}')
          echo "Volume: $VOL"

          VOLUME_ID=$(echo "$VOL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('volumeCreate',{}).get('id',''))" 2>/dev/null)
          echo "Volume ID: $VOLUME_ID"

          if [ -z "$VOLUME_ID" ]; then
            echo "❌ Falha ao criar volume"
            exit 1
          fi

          echo "=== Atualizando DATABASE_URL para usar o volume ==="
          VARS=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { variableUpsert(input: { projectId: \"e129b873-ae12-48d1-9c6c-0822fb04cfe0\", serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\", name: \"DATABASE_URL\", value: \"sqlite:////data/facil_leads.db\" }) }"}')
          echo "Vars: $VARS"

          echo "=== Disparando redeploy ==="
          curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"c1e1aad1-1155-48a7-b100-81e97c184334\", environmentId: \"3b900ec1-ccb9-47bd-9a76-1dd558a7ea6c\") }"}'

          echo "✅ Concluído!"
